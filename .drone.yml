kind: pipeline
type: docker
name: ci-deploy

trigger:
  branch:
    - main

steps:
  # ── Backend ────────────────────────────────────────────────────────
  - name: backend-test
    image: golang:1.26-alpine
    environment:
      CGO_ENABLED: "0"
    commands:
      - cd backend
      - go mod download
      - go build ./...
      - go test -v -count=1 ./...
      - go vet ./...

  - name: backend-image
    image: plugins/docker
    settings:
      registry: 192.168.0.103:5000
      repo: 192.168.0.103:5000/vgradio/backend
      tags: ["latest", "${DRONE_COMMIT_SHA:0:7}"]
      context: backend
      dockerfile: backend/Dockerfile
      insecure: true
    when:
      status:
        - success

  # ── Web ────────────────────────────────────────────────────────────
  - name: web-image
    image: plugins/docker
    settings:
      registry: 192.168.0.103:5000
      repo: 192.168.0.103:5000/vgradio/web
      tags: ["latest", "${DRONE_COMMIT_SHA:0:7}"]
      context: web
      dockerfile: web/Dockerfile
      insecure: true
      build_args:
        - VITE_API_URL=https://api.vgradio.lab
    when:
      status:
        - success

  # ── Deploy ─────────────────────────────────────────────────────────
  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host: 192.168.0.104
      username: maaya
      key:
        from_secret: ssh_private_key
      script:
        - cd ~/srv/vgradio
        - docker compose pull
        - docker compose up -d --remove-orphans
    when:
      status:
        - success
